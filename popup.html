<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      width: 280px;
      padding: 16px;
      background: linear-gradient(160deg, #0f0f17 0%, #1a1a2e 50%, #0d1b2a 100%);
      color: #e8e8e8;
    }

    button {
      width: 100%;
      padding: 20px 20px;
      margin-bottom: 12px;
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, #ff6b35 0%, #f7c531 100%);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: left;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    button:last-of-type {
      margin-bottom: 0;
    }

    button .main-text {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    button .sub-text {
      font-size: 13px;
      font-weight: 500;
      opacity: 0.85;
      letter-spacing: -0.1px;
    }

    button#exportAllBtn {
      background: linear-gradient(135deg, #3b82f6 0%, #06b6d4 100%);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(255, 107, 53, 0.4);
    }

    button#exportAllBtn:hover {
      box-shadow: 0 8px 24px rgba(59, 130, 246, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .status {
      font-size: 11px;
      text-align: center;
      transition: all 0.2s ease;
      overflow: hidden;
    }

    .status:empty {
      display: none;
    }

    .status:not(:empty) {
      margin-top: 12px;
      padding: 8px 10px;
      border-radius: 6px;
    }

    .status.success {
      color: #4ade80;
      background: rgba(74, 222, 128, 0.1);
    }

    .status.error {
      color: #f87171;
      background: rgba(248, 113, 113, 0.1);
    }

    .status.info {
      color: #60a5fa;
      background: rgba(96, 165, 250, 0.1);
    }
  </style>
</head>
<body>
  <button id="exportCurrentBtn">
    <div class="main-text">Export Current Window</div>
    <div class="sub-text" id="currentCount">... tabs</div>
  </button>

  <button id="exportAllBtn">
    <div class="main-text">Export All Windows</div>
    <div class="sub-text" id="allCount">... tabs</div>
  </button>

  <p class="status" id="status"></p>

  <!-- Load shared export module first -->
  <script src="shared/exportCore.js"></script>
  <!-- Then load popup logic -->
  <script src="popup.js"></script>
</body>
</html>
